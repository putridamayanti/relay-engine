services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: relay_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d relay_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    command: ["./api"]
    restart: always
    environment:
      - PORT=8000
      - DATABASE_URL=postgres://user:password@db:5432/relay_db?sslmode=disable
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  worker:
    build: .
    command: ["./worker"]
    restart: always
    environment:
      - WORKER_ID=worker-1
      - DATABASE_URL=postgres://user:password@db:5432/relay_db?sslmode=disable
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
